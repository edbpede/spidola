# Android lane (TECH_SPEC §9): Gradle build, ktlint, detekt (Compose ruleset), unit tests.
# Toolchain pins live in apps/androidtv/gradle/libs.versions.toml + the committed wrapper;
# JDK is pinned to 21 (docs/toolchains.md). detekt/ktlint complexity rules are advisory
# (config/detekt/detekt.yml, modularity doctrine §3.1).
name: android

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: apps/androidtv

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4

      - name: ktlint + detekt (advisory complexity)
        run: ./gradlew ktlintCheck detekt

      - name: Assemble (debug)
        run: ./gradlew assembleDebug

      - name: Unit tests
        run: ./gradlew testDebugUnitTest

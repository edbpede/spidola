# Apple lane (TECH_SPEC §9): swift-format + SwiftLint, build the SPM packages, generate the
# Xcode project (XcodeGen, docs/toolchains.md), build the tvOS app, and run XCTest.
# SwiftLint complexity/length rules are advisory (apps/tvos/.swiftlint.yml, doctrine §3.1).
name: apple

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: apple-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apple:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select pinned Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.6"

      - name: Assert toolchains
        run: tools/ci/assert-toolchains.sh

      - name: swift-format lint (strict)
        run: |
          find apps/tvos -name '*.swift' \
            -not -path '*/.build/*' -not -path '*/Generated/*' \
            -not -path '*/contract-harness/*' \
            -print0 | xargs -0 swift format lint --strict

      - name: SwiftLint
        run: |
          brew install swiftlint
          swiftlint lint --strict

      - name: Add tvOS Rust targets
        run: rustup target add aarch64-apple-tvos aarch64-apple-tvos-sim

      - name: Build + stage the UniFFI XCFramework
        run: |
          cargo run -p xtask -- package-xcframework
          rm -rf apps/tvos/Packages/CoreKit/CoreFFI.xcframework
          cp -R target/xcframework/CoreFFI.xcframework \
            apps/tvos/Packages/CoreKit/CoreFFI.xcframework

      - name: Build SPM packages
        run: |
          sdk="$(xcrun --sdk appletvsimulator --show-sdk-path)"
          for pkg in apps/tvos/Packages/*/; do
            echo "== building $pkg =="
            swift build \
              --package-path "$pkg" \
              --triple arm64-apple-tvos18.0-simulator \
              --sdk "$sdk"
          done

      - name: Generate Xcode project + build app
        run: |
          set -o pipefail
          brew install xcodegen xcbeautify
          cd apps/tvos
          xcodegen generate
          xcodebuild build \
            -project Spidola.xcodeproj \
            -scheme Spidola \
            -destination 'generic/platform=tvOS Simulator' \
            CODE_SIGNING_ALLOWED=NO | xcbeautify

      - name: tvOS simulator unit + UI smoke tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project apps/tvos/Spidola.xcodeproj \
            -scheme Spidola \
            -destination 'platform=tvOS Simulator,name=Apple TV 4K (3rd generation),OS=latest' \
            CODE_SIGNING_ALLOWED=NO | xcbeautify

  # FFI parity keel (TECH_SPEC §5, §10): build the Swift contract harness against the real
  # compiled core and run the same fixture flow as the Rust + Kotlin harnesses.
  contract:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select pinned Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.6"

      - name: Show pinned Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2

      # Packaging (TECH_SPEC §9): the tvOS targets are Rust Tier 2, so prebuilt std ships with
      # the pinned stable toolchain — no `-Z build-std` (fallback in docs/toolchains.md).
      - name: Add tvOS Rust targets (Tier 2)
        run: rustup target add aarch64-apple-tvos aarch64-apple-tvos-sim

      - name: Build tvOS XCFramework
        run: cargo run -p xtask -- package-xcframework

      - name: Swift FFI contract harness
        run: tools/ci/build-contract-harness-tvos.sh

name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: Version name for the unsigned dry run
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  android-direct:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
      - uses: Swatinem/rust-cache@v2

      - name: Install pinned native build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install --yes autoconf automake cmake libtool meson nasm ninja-build pkg-config
          cargo install cargo-ndk --locked --version 4.1.2
          NDK_VERSION=28.2.13676358
          yes | sdkmanager "ndk;$NDK_VERSION" >/dev/null
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/$NDK_VERSION" >> "$GITHUB_ENV"
          rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android

      - name: Build and verify pinned LGPL libmpv
        run: |
          tools/build-libmpv-android/build.sh
          tools/build-libmpv-android/verify-pins.sh

      - name: Build universal direct-release APK and checksums
        env:
          INPUT_VERSION: ${{ inputs.version }}
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SPIDOLA_ANDROID_KEYSTORE_BASE64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SPIDOLA_ANDROID_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SPIDOLA_ANDROID_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SPIDOLA_ANDROID_KEY_PASSWORD }}
        run: |
          version="${INPUT_VERSION:-0.0.0-${GITHUB_SHA::7}}"
          publish=false
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
            publish=true
          fi

          signing_values=(
            "$SIGNING_KEYSTORE_BASE64"
            "$SIGNING_STORE_PASSWORD"
            "$SIGNING_KEY_ALIAS"
            "$SIGNING_KEY_PASSWORD"
          )
          signing_count=0
          for value in "${signing_values[@]}"; do
            [ -z "$value" ] || signing_count=$((signing_count + 1))
          done
          if [ "$signing_count" -ne 0 ] && [ "$signing_count" -ne 4 ]; then
            echo "error: Android release signing secrets are only partially configured" >&2
            exit 1
          fi

          signing_args=()
          if [ "$signing_count" -eq 4 ]; then
            keystore="$RUNNER_TEMP/spidola-release.jks"
            printf '%s' "$SIGNING_KEYSTORE_BASE64" | base64 --decode > "$keystore"
            chmod 600 "$keystore"
            export SPIDOLA_ANDROID_KEYSTORE="$keystore"
            export SPIDOLA_ANDROID_STORE_PASSWORD="$SIGNING_STORE_PASSWORD"
            export SPIDOLA_ANDROID_KEY_ALIAS="$SIGNING_KEY_ALIAS"
            export SPIDOLA_ANDROID_KEY_PASSWORD="$SIGNING_KEY_PASSWORD"
          fi
          if $publish; then
            [ "$signing_count" -eq 4 ] || {
              echo "error: tag publication requires all Android signing secrets" >&2
              exit 1
            }
            signing_args+=(--require-signing)
          fi

          tools/release/build-android-direct.sh \
            --version "$version" \
            --version-code "$GITHUB_RUN_NUMBER" \
            --output-dir "$GITHUB_WORKSPACE/dist/android" \
            "${signing_args[@]}"
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"

      - name: Generate Conventional-Commit changelog
        run: |
          args=(--version "$RELEASE_VERSION" --to-ref "$GITHUB_SHA" --output dist/android/CHANGELOG.md)
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            previous="$(git tag --sort=-version:refname | grep -vx "$GITHUB_REF_NAME" | head -1 || true)"
            [ -z "$previous" ] || args+=(--from-ref "$previous")
          fi
          python3 tools/release/generate-changelog.py "${args[@]}"

      - name: Retain release dry-run evidence
        uses: actions/upload-artifact@v4
        with:
          name: spidola-android-${{ env.RELEASE_VERSION }}
          if-no-files-found: error
          retention-days: 14
          path: dist/android/**

      - name: Attach signed direct APK to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" \
              --verify-tag \
              --title "Spidola $RELEASE_VERSION" \
              --notes-file dist/android/CHANGELOG.md
          gh release upload "$GITHUB_REF_NAME" dist/android/* --clobber

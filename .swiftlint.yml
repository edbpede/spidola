# SwiftLint config for the tvOS shell (TECH_SPEC §9, §6). CI and the prek hook run
# `swiftlint lint --strict`, which promotes warnings to errors — so complexity/length
# rules are kept ADVISORY here via generous thresholds (modularity doctrine §3.1). A
# genuine one-concept exceedance is answered with a scoped `// swiftlint:disable:next`,
# never a global threshold bump.

included:
  - apps/tvos

excluded:
  - "**/.build"
  - "**/*.build"
  - "**/Package.swift" # SPM manifests are build config, not app code.
  - apps/tvos/Packages/CoreKit/Generated # UniFFI-generated bindings (not hand-written).
  - apps/tvos/contract-harness # Bare FFI test harness, not shell code (TECH_SPEC §10).

# swift-format owns collection-literal comma style; avoid a contradictory SwiftLint rule.
disabled_rules:
  - trailing_comma
  # swift-format owns brace placement: when a declaration or signature wraps (a long
  # inheritance clause or return type), swift-format puts the open brace on its own line,
  # which `opening_brace` would reject. swift-format is authoritative, so disable the rule.
  - opening_brace

line_length:
  warning: 120
  error: 200
  ignores_comments: true
  ignores_urls: true

# Advisory complexity/length thresholds (generous on purpose).
type_body_length:
  warning: 400
  error: 800
file_length:
  warning: 600
  error: 1200
  ignore_comment_only_lines: true
function_body_length:
  warning: 100
  error: 250
cyclomatic_complexity:
  warning: 20
  error: 40

identifier_name:
  min_length: 1

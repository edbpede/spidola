# REUSE annotations (spec 3.3) for seed files that do not carry an inline SPDX header:
# prose/docs, generated lockfiles, and committed binary tooling artifacts. Everything
# else declares its license inline. Verified by `reuse lint` in the core CI lane.
version = 1

# Generated lockfiles are committed for reproducibility (Phase 0) but are JSON/TOML the
# generator rewrites, so they cannot carry an inline header.
[[annotations]]
path = ["LICENSE", "Cargo.lock", "apps/tvos/Packages/*/Package.resolved"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Spidola contributors"
SPDX-License-Identifier = "AGPL-3.0-or-later"

# All Markdown prose (docs/, CONTRIBUTING.md, APPSTORE_EXCEPTION.md, .augment/rules/,
# fixtures provenance READMEs) is project documentation under the project license.
[[annotations]]
path = ["*.md", "**/*.md"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Spidola contributors"
SPDX-License-Identifier = "AGPL-3.0-or-later"

# JSON fixtures (the Xtream corpus, Phase 6) cannot carry an inline header: JSON has no
# comment syntax, and the listing fixtures are top-level arrays, which cannot hold a note key
# either. Their provenance notes live in the sibling README.md per the corpus convention.
[[annotations]]
path = ["fixtures/**/*.json"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Spidola contributors"
SPDX-License-Identifier = "AGPL-3.0-or-later"

# String Catalogs are JSON and cannot carry an inline header (same constraint as the fixtures
# above). These are authored, not generated: they are the shells' English-first localization
# source (PRD §6.10).
[[annotations]]
path = ["apps/tvos/Packages/**/*.xcstrings"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Spidola contributors"
SPDX-License-Identifier = "AGPL-3.0-or-later"

# Canonical project logo used by the repository documentation.
[[annotations]]
path = ["spidola-logo.svg"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Spidola contributors"
SPDX-License-Identifier = "AGPL-3.0-or-later"

# The Gradle wrapper is third-party tooling (Apache-2.0). The gradlew/gradlew.bat scripts
# already carry inline SPDX headers; the binary jar and the generated properties file cannot.
[[annotations]]
path = [
  "apps/androidtv/gradle/wrapper/gradle-wrapper.jar",
  "apps/androidtv/gradle/wrapper/gradle-wrapper.properties",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "Gradle, Inc."
SPDX-License-Identifier = "Apache-2.0"

# UniFFI-generated Swift + Kotlin bindings (produced by `cargo xtask gen-bindings` in library
# mode from the AGPL Rust definitions). Committed for reproducible shell builds and the CI
# drift check; regenerated code carries no inline header.
[[annotations]]
path = [
  "apps/tvos/Packages/CoreKit/Generated/**",
  "apps/androidtv/core/corekit/generated/**",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Spidola contributors"
SPDX-License-Identifier = "AGPL-3.0-or-later"

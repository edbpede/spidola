# XcodeGen spec: `xcodegen generate` produces Spidola.xcodeproj (kept out of the tree so
# the project stays text-reviewable). The Apple CI lane generates then builds it.
name: Spidola
options:
  bundleIdPrefix: dev.spidola
  createIntermediateGroups: true
  deploymentTarget:
    tvOS: "18.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    "EXCLUDED_ARCHS[sdk=appletvsimulator*]": x86_64
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
packages:
  CoreKit: { path: Packages/CoreKit }
  DesignSystem: { path: Packages/DesignSystem }
  PlayerContract: { path: Packages/PlayerContract }
  PlayerMPV: { path: Packages/PlayerMPV }
  PlayerAV: { path: Packages/PlayerAV }
  FeatureBrowse: { path: Packages/FeatureBrowse }
  FeaturePlayback: { path: Packages/FeaturePlayback }
  FeatureSources: { path: Packages/FeatureSources }
  FeatureSearch: { path: Packages/FeatureSearch }
  FeatureSettings: { path: Packages/FeatureSettings }
targets:
  Spidola:
    type: application
    platform: tvOS
    deploymentTarget: "18.0"
    sources: [App]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.spidola.tv
        INFOPLIST_FILE: App/Info.plist
        MARKETING_VERSION: 0.0.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    dependencies:
      - package: CoreKit
      - package: DesignSystem
      - package: PlayerContract
      - package: PlayerMPV
      - package: PlayerAV
      - package: FeatureBrowse
      - package: FeaturePlayback
      - package: FeatureSources
      - package: FeatureSearch
      - package: FeatureSettings
  SpidolaUITests:
    type: bundle.ui-testing
    platform: tvOS
    deploymentTarget: "18.0"
    # The package test suites are compiled into this bundle because `swift test` cannot run a
    # tvOS-triple package: the Apple lane runs them here or not at all.
    sources:
      - UITests
      - Packages/FeatureBrowse/Tests/FeatureBrowseTests
      - Packages/FeatureSearch/Tests/FeatureSearchTests
      - Packages/FeatureSources/Tests/FeatureSourcesTests
      - Packages/PlayerContract/Tests/PlayerContractTests
      - Packages/FeaturePlayback/Tests/FeaturePlaybackTests
      - Packages/PlayerAV/Tests/PlayerAVTests
      - Packages/PlayerMPV/Tests/PlayerMPVTests
    dependencies:
      - target: Spidola
      - package: CoreKit
      - package: FeatureBrowse
      - package: FeatureSearch
      - package: FeatureSources
      - package: PlayerContract
      - package: FeaturePlayback
      - package: PlayerAV
      - package: PlayerMPV
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.spidola.tv.uitests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Spidola:
    build:
      targets: { Spidola: all }
    run:
      config: Debug
    test:
      targets:
        - SpidolaUITests

#
# The pinned source graph for the LGPL libmpv Android build (TECH_SPEC §7, §12).
#
# Nothing is fetched that is not named here, and nothing named here is used without its
# digest matching. `verify-pins.sh` re-derives every digest below and fails on drift;
# `fetch.sh` refuses to unpack a source whose digest does not match.
#
# Columns: NAME  KIND  VERSION  DIGEST  URL   (whitespace-separated; no field contains a space)
#
# KIND semantics:
#   tarball         DIGEST is the sha256 of the archive at URL. Used wherever upstream
#                   publishes a stable, uploaded release artifact — those are byte-stable.
#   git             DIGEST is the git commit SHA the tag resolves to. Used where upstream
#                   publishes no source tarball (mpv) or where the tree needs submodules
#                   (libplacebo). A commit SHA is itself a content hash over the whole tree,
#                   so it is a stronger pin than a sha256 of an archive — and unlike
#                   GitHub's auto-generated tarballs (whose bytes have changed under
#                   upstream's feet before), it cannot drift.
#   git-submodule   DIGEST is the gitlink SHA recorded by the parent repo at its pinned
#                   commit. NAME is the submodule path under its parent.
#
# VERSION is the human-readable upstream tag; DIGEST is what is actually enforced.

# ── TLS ─────────────────────────────────────────────────────────────────────
# Mbed-TLS, not OpenSSL: FFmpeg's configure refuses OpenSSL <3 under a GPL build and
# demands --enable-version3 for OpenSSL >=3 (configure:7126). Mbed-TLS is Apache-2.0,
# carries no such coupling, and cross-compiles to Android without a host quirk.
# Pinned to the 3.6 LTS line: Mbed-TLS 4.x is a deliberate API break that FFmpeg 7.1
# does not target.
mbedtls  tarball  mbedtls-3.6.7  a7e8bcbec0e6f761b4af24f25677626b35f762f68eef79c08677a363212d11f6  https://github.com/Mbed-TLS/mbedtls/releases/download/mbedtls-3.6.7/mbedtls-3.6.7.tar.bz2


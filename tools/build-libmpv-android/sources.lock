# (mpv meson.build:29, and features['libplacebo'] is unconditionally true at line 51).
# LGPL-2.1-or-later. Fetched over git because it needs its submodules.
libplacebo  git  v7.360.1  cee9b076f2c63104ccfd497fa79c39a867293ec4  https://github.com/haasn/libplacebo.git

# libplacebo submodules. Only the four the OpenGL-ES build actually reads are pinned and
# fetched: glad generates the GL loader at build time and does it by rendering jinja
# templates (hence jinja and its markupsafe dependency), and fast_float is used by the
# core. 3rdparty/Vulkan-Headers is skipped because we build with -Dvulkan=disabled, and
# demos/3rdparty/nuklear because we build with -Ddemos=false.
libplacebo/3rdparty/glad        git-submodule  -  73db193f853e2ee079bf3ca8a64aa2eaf6459043  https://github.com/Dav1dde/glad
libplacebo/3rdparty/jinja       git-submodule  -  15206881c006c79667fe5154fe80c01c65410679  https://github.com/pallets/jinja
libplacebo/3rdparty/markupsafe  git-submodule  -  297fc8e356e6836a62087949245d09a28e9f1b13  https://github.com/pallets/markupsafe
libplacebo/3rdparty/fast_float  git-submodule  -  97b54ca9e75f5303507699d27c6b4f4efe4641a1  https://github.com/fastfloat/fast_float.git

